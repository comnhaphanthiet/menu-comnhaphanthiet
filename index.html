<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cơm Nhà Phan Thiết</title>

    <style>
        :root {
            --bg-color: #d8cfc3;
            --shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
            --transition: 0.3s ease;
            --radius: 8px;
            --primary: #0068ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            overflow: hidden;
        }

        /* ===== SLIDER ===== */
        .slider {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            height: calc(100dvh - 90px);
            scrollbar-width: none;
        }

        .slider::-webkit-scrollbar {
            display: none;
        }

        .slide {
            min-width: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            scroll-snap-align: start;
            padding: 16px 20px;
            transition: all var(--transition);
            will-change: transform, opacity, filter;
        }

        .slide.active {
            z-index: 10;
        }

        .slide:nth-child(2n) {
        }

        @media (min-height: 800px) {
            .slide {
                align-items: center;
            }
        }

        /* IMAGE */
        .img-wrap {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: center;
            overflow: hidden;
            border-radius: 16px;
            position: relative;
        }

        .img-wrap img {
            width: 100%;
            height: auto;
            max-height: calc(100dvh - 120px);
            object-fit: contain;
            border-radius: 16px;
            box-shadow: var(--shadow);
            transform-origin: center;
            transition: transform 0.2s ease;
            will-change: transform;
        }

        /* ===== PROGRESS BAR ===== */
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), #FF6B9D);
            width: 0%;
            z-index: 100;
            animation: progress 0.1s ease;
        }

        @keyframes progress {
            0% { width: 0%; }
        }

        /* ===== DOTS ===== */
        .dots {
            position: fixed;
            bottom: 95px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 1;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .dot:hover {
            background: rgba(0, 0, 0, 0.4);
            transform: scale(1.1);
        }

        .dot.active {
            background: #000;
            width: 24px;
            border-radius: 50%;
        }

        /* ===== BUTTON ===== */
        .btn-group {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            gap: 8px;
            padding: 10px;
            background: rgba(216, 207, 195, 0.7);
            backdrop-filter: blur(10px);
            max-width: 600px;
            margin: 0 auto;
            border-radius: 12px 12px 0 0;
            z-index: 2;
        }

        .btn {
            flex: 1;
            text-align: center;
            padding: 12px;
            border-radius: var(--radius);
            font-weight: bold;
            text-decoration: none;
            color: white;
            transition: opacity 0.2s ease;
        }

        .btn:active {
            opacity: 0.8;
        }

        .zalo {
            background: #0068ff;
        }

        .wa {
            background: #25D366;
        }

        .call {
            background: #444;
        }
    </style>
</head>

<body>

    <div class="slider" id="slider">
        <div class="progress-bar" id="progressBar"></div>
        <div class="slide">
            <div class="img-wrap"><img src="menu-1.webp" alt="Menu 1"></div>
        </div>
        <div class="slide">
            <div class="img-wrap"><img src="menu-2.webp" alt="Menu 2"></div>
        </div>
        <div class="slide">
            <div class="img-wrap"><img src="menu-3.webp" alt="Menu 3"></div>
        </div>
        <div class="slide">
            <div class="img-wrap"><img src="menu-4.webp" alt="Menu 4"></div>
        </div>
        <div class="slide">
            <div class="img-wrap"><img src="menu-5.webp" alt="Menu 5"></div>
        </div>
    </div>

    <div class="dots" id="dots"></div>

    <div class="btn-group">
        <a class="btn zalo" href="https://zalo.me/0866461221">Zalo</a>
        <a class="btn wa" href="https://wa.me/84866461221">WhatsApp</a>
        <a class="btn call" href="tel:+84866461221">Call</a>
    </div>

    <script>
        const slider = document.getElementById("slider");
        const slides = document.querySelectorAll(".slide");
        const images = document.querySelectorAll("img");
        const dotsContainer = document.getElementById("dots");
        const progressBar = document.getElementById("progressBar");
        const total = slides.length;

        let scrollTimeout;
        let touchStartX = 0;

        const AUTOPLAY_THRESHOLD = 50;

        /* ===== HELPER FUNCTIONS ===== */
        function getDist(touches) {
            const dx = touches[0].clientX - touches[1].clientX;
            const dy = touches[0].clientY - touches[1].clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        function updateActive() {
            const index = Math.round(slider.scrollLeft / slider.clientWidth);
            
            slides.forEach(s => s.classList.remove("active"));
            if (slides[index]) slides[index].classList.add("active");

            const dots = dotsContainer.querySelectorAll(".dot");
            dots.forEach(d => d.classList.remove("active"));
            if (dots[index]) dots[index].classList.add("active");

            updateProgressBar(index);
        }

        function updateProgressBar(index) {
            const progress = ((index + 1) / total) * 100;
            progressBar.style.width = progress + "%";
        }

        function goToSlide(index) {
            const position = index * slider.clientWidth;
            slider.scrollTo({
                left: position,
                behavior: "smooth"
            });
        }

        function nextSlide() {
            const index = Math.round(slider.scrollLeft / slider.clientWidth);
            const nextIndex = (index + 1) % total;
            goToSlide(nextIndex);
        }

        function prevSlide() {
            const index = Math.round(slider.scrollLeft / slider.clientWidth);
            const prevIndex = (index - 1 + total) % total;
            goToSlide(prevIndex);
        }

        /* ===== CREATE DOTS ===== */
        for (let i = 0; i < total; i++) {
            const dot = document.createElement("div");
            dot.classList.add("dot");
            if (i === 0) dot.classList.add("active");
            dot.addEventListener("click", () => goToSlide(i));
            dotsContainer.appendChild(dot);
        }

        /* ===== SCROLL HANDLER WITH SNAP ===== */
        slider.addEventListener("scroll", () => {
            updateActive();
            clearTimeout(scrollTimeout);

            scrollTimeout = setTimeout(() => {
                const index = Math.round(slider.scrollLeft / slider.clientWidth);
                slider.scrollTo({
                    left: index * slider.clientWidth,
                    behavior: "smooth"
                });
            }, 80);
        }, { passive: true });

        /* ===== KEYBOARD NAVIGATION ===== */
        document.addEventListener("keydown", (e) => {
            if (e.key === "ArrowLeft") prevSlide();
            if (e.key === "ArrowRight") nextSlide();
        });

        /* ===== IMAGE TOUCH INTERACTIONS ===== */
        images.forEach(img => {
            let scale = 1;
            let posX = 0, posY = 0;
            let startX = 0, startY = 0;
            let startDist = 0;
            let isDragging = false;

            img.addEventListener("touchstart", e => {
                touchStartX = e.touches[0].clientX;
                
                if (e.touches.length === 2) {
                    startDist = getDist(e.touches);
                } else if (e.touches.length === 1 && scale > 1) {
                    isDragging = true;
                    startX = e.touches[0].clientX - posX;
                    startY = e.touches[0].clientY - posY;
                }
            }, { passive: true });

            img.addEventListener("touchmove", e => {
                if (e.touches.length === 2) {
                    const newDist = getDist(e.touches);
                    scale *= newDist / startDist;
                    scale = Math.min(Math.max(scale, 1), 3);
                    startDist = newDist;
                } else if (isDragging) {
                    posX = e.touches[0].clientX - startX;
                    posY = e.touches[0].clientY - startY;
                }

                img.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
            }, { passive: true });

            img.addEventListener("touchend", (e) => {
                isDragging = false;
                
                // Swipe detection
                const touchEndX = e.changedTouches[0].clientX;
                const diff = touchStartX - touchEndX;
                
                if (Math.abs(diff) > AUTOPLAY_THRESHOLD && scale === 1) {
                    if (diff > 0) {
                        nextSlide();
                    } else {
                        prevSlide();
                    }
                }
                
                if (scale === 1) {
                    posX = 0;
                    posY = 0;
                    img.style.transform = "scale(1)";
                }
            }, { passive: true });

            img.addEventListener("dblclick", () => {
                scale = scale === 1 ? 2 : 1;
                posX = posY = 0;
                img.style.transform = `scale(${scale})`;
            });
        });

        /* ===== INIT ===== */
        window.addEventListener("load", updateActive);
    </script>

</body>

</html>
